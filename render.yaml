services:
  - type: web
    name: pivnoepuzo-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: ADMIN_TOKEN
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: static
    name: pivnoepuzo-frontend
    rootDir: Pivo
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
